[pytest]
# Pytest configuration for Bitcoin Model V2 tests

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers for test categorization
markers =
    unit: Unit tests for individual components (fast)
    integration: Integration tests for component interactions (medium)
    performance: Performance benchmarking tests (can be slow)
    database: Tests requiring database connectivity (requires setup)
    slow: Tests that take significant time (>1s)

# Output options
addopts = 
    -v
    --strict-markers
    --tb=short
    --disable-warnings

# Timeout for tests (10 seconds per test by default)
timeout = 10

# Minimum Python version
minversion = 3.8

# Test paths
testpaths = tests

# Console output
console_output_style = progress

# Coverage options (if pytest-cov installed)
# --cov=Code --cov-report=html --cov-report=term-missing
